name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FFMPEG_VERSION: "7.1"
  FFMPEG_CACHE_V: "1"

jobs:
  build-ffmpeg:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
            ffmpeg_extra: "--enable-videotoolbox --enable-hwaccel=h264_videotoolbox,hevc_videotoolbox --enable-encoder=h264_videotoolbox,hevc_videotoolbox"
          - os: macos-15-intel
            platform: darwin-x64
            ffmpeg_extra: "--enable-videotoolbox --enable-hwaccel=h264_videotoolbox,hevc_videotoolbox --enable-encoder=h264_videotoolbox,hevc_videotoolbox"
          - os: ubuntu-22.04
            platform: linux-x64
            ffmpeg_extra: ""
          - os: windows-latest
            platform: windows-x64
            ffmpeg_extra: "--target-os=mingw32 --arch=x86_64 --disable-pthreads --enable-w32threads"

    runs-on: ${{ matrix.os }}
    steps:
      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          key: ffmpeg-${{ matrix.platform }}-${{ env.FFMPEG_VERSION }}-v${{ env.FFMPEG_CACHE_V }}
          path: ${{ matrix.platform == 'windows-x64' && 'C:/ffmpeg-prefix' || format('{0}/ffmpeg-prefix', runner.temp) }}

      - name: Install build deps (macOS)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'macOS'
        run: brew install nasm x264 x265

      - name: Install build deps (Linux)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm zlib1g-dev cmake

      - name: Set up MSYS2 (Windows)
        if: matrix.platform == 'windows-x64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git
            diffutils
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-nasm
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-zlib
            mingw-w64-x86_64-pkgconf

      - name: Build static x264 (Linux)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          PREFIX="${{ runner.temp }}/ffmpeg-prefix"
          mkdir -p "$PREFIX"
          git clone --depth 1 https://code.videolan.org/videolan/x264.git /tmp/x264-src
          cd /tmp/x264-src
          ./configure --prefix="$PREFIX" --enable-static --disable-shared --enable-pic --disable-cli
          make -j$(nproc) && make install

      - name: Build static x265 (Linux)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os == 'Linux'
        run: |
          PREFIX="${{ runner.temp }}/ffmpeg-prefix"
          git clone --depth 1 -b 4.1 https://bitbucket.org/multicoreware/x265_git.git /tmp/x265-src
          cd /tmp/x265-src/build/linux
          cmake ../../source \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DENABLE_SHARED=OFF \
            -DCMAKE_POSITION_INDEPENDENT_CODE=ON \
            -DENABLE_CLI=OFF
          make -j$(nproc) && make install

      - name: Build FFmpeg (POSIX)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          PREFIX="${{ runner.temp }}/ffmpeg-prefix"
          mkdir -p "$PREFIX"
          git clone --depth 1 --branch n${{ env.FFMPEG_VERSION }} https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src

          EXTRA_CFLAGS="-I$PREFIX/include"
          EXTRA_LDFLAGS="-L$PREFIX/lib"

          if [ "$RUNNER_OS" = "macOS" ]; then
            BREW_PREFIX="$(brew --prefix)"
            EXTRA_CFLAGS="$EXTRA_CFLAGS -I$BREW_PREFIX/include -I$BREW_PREFIX/opt/x264/include -I$BREW_PREFIX/opt/x265/include"
            EXTRA_LDFLAGS="$EXTRA_LDFLAGS -L$BREW_PREFIX/lib -L$BREW_PREFIX/opt/x264/lib -L$BREW_PREFIX/opt/x265/lib"
          fi

          _PKG="$PREFIX/lib/pkgconfig"
          if [ "$RUNNER_OS" = "macOS" ]; then
            _PKG="$_PKG:$BREW_PREFIX/lib/pkgconfig:$BREW_PREFIX/opt/x264/lib/pkgconfig:$BREW_PREFIX/opt/x265/lib/pkgconfig"
          fi

          PKG_CONFIG_PATH="$_PKG" \
          ./configure \
            --prefix="$PREFIX" \
            --enable-static --disable-shared --enable-pic \
            --disable-autodetect --disable-programs --disable-doc --disable-network \
            --disable-everything \
            --pkg-config-flags="--static" \
            --enable-avcodec --enable-avformat --enable-avfilter \
            --enable-swscale --enable-swresample \
            --enable-gpl --enable-zlib --enable-libx264 --enable-libx265 \
            --enable-decoder=h264,hevc,vp8,vp9,rawvideo,png,pcm_s16le,aac,pcm_f32le \
            --enable-encoder=libx264,libx265,rawvideo,png,aac \
            --enable-parser=h264,hevc,vp8,vp9,aac \
            --enable-demuxer=mov,matroska,rawvideo,image2,wav,aac \
            --enable-muxer=mp4,mov,image2,null \
            --enable-filter=overlay,scale,crop,color,format,pad,alphamerge,null,anull,aformat,setpts,asetpts,fps,trim,atrim,split,asplit,buffer,buffersink,abuffer,abuffersink \
            --enable-protocol=file,pipe \
            --enable-bsf=h264_mp4toannexb,hevc_mp4toannexb,aac_adtstoasc \
            --enable-small \
            --extra-cflags="$EXTRA_CFLAGS" \
            --extra-ldflags="$EXTRA_LDFLAGS" \
            ${{ matrix.ffmpeg_extra }}

          make -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)
          make install

          if [ "$RUNNER_OS" = "macOS" ]; then
            cp "$BREW_PREFIX/opt/x264/lib/libx264.a" "$PREFIX/lib/" 2>/dev/null || true
            cp "$BREW_PREFIX/opt/x265/lib/libx265.a" "$PREFIX/lib/" 2>/dev/null || true
          fi

      - name: Build static x264 (Windows)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && matrix.platform == 'windows-x64'
        shell: msys2 {0}
        run: |
          PREFIX="/c/ffmpeg-prefix"
          mkdir -p "$PREFIX"
          git clone --depth 1 https://code.videolan.org/videolan/x264.git /tmp/x264-src
          cd /tmp/x264-src
          ./configure --prefix="$PREFIX" --enable-static --disable-shared --disable-cli
          make -j$(nproc) && make install

      - name: Build static x265 (Windows)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && matrix.platform == 'windows-x64'
        shell: msys2 {0}
        run: |
          PREFIX="/c/ffmpeg-prefix"
          git clone --depth 1 -b 4.1 https://bitbucket.org/multicoreware/x265_git.git /tmp/x265-src
          # Patch CMakeLists.txt for CMake 4.x compatibility:
          # update minimum version and remove policies that can no longer be set to OLD
          sed -i 's/cmake_minimum_required(VERSION [0-9.]*)/cmake_minimum_required(VERSION 3.5)/' \
              /tmp/x265-src/source/CMakeLists.txt
          sed -i '/cmake_policy(SET CMP0025 OLD)/d' /tmp/x265-src/source/CMakeLists.txt
          sed -i '/cmake_policy(SET CMP0054 OLD)/d' /tmp/x265-src/source/CMakeLists.txt
          cmake /tmp/x265-src/source \
            -G Ninja \
            -DCMAKE_INSTALL_PREFIX="$PREFIX" \
            -DENABLE_SHARED=OFF \
            -DENABLE_CLI=OFF
          ninja && ninja install

      - name: Build FFmpeg (Windows)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true' && matrix.platform == 'windows-x64'
        shell: msys2 {0}
        run: |
          PREFIX="/c/ffmpeg-prefix"
          mkdir -p "$PREFIX/lib" "$PREFIX/include"
          git clone --depth 1 --branch n${{ env.FFMPEG_VERSION }} \
            https://github.com/FFmpeg/FFmpeg.git /tmp/ffmpeg-src
          cd /tmp/ffmpeg-src
          PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig:/mingw64/lib/pkgconfig" \
          ./configure \
            --prefix="$PREFIX" \
            --enable-static --disable-shared \
            --disable-autodetect --disable-programs --disable-doc --disable-network \
            --disable-everything \
            --pkg-config-flags="--static" \
            --enable-avcodec --enable-avformat --enable-avfilter \
            --enable-swscale --enable-swresample \
            --enable-gpl --enable-zlib --enable-libx264 --enable-libx265 \
            --enable-decoder=h264,hevc,vp8,vp9,rawvideo,png,pcm_s16le,aac,pcm_f32le \
            --enable-encoder=libx264,libx265,rawvideo,png,aac \
            --enable-parser=h264,hevc,vp8,vp9,aac \
            --enable-demuxer=mov,matroska,rawvideo,image2,wav,aac \
            --enable-muxer=mp4,mov,image2,null \
            --enable-filter=overlay,scale,crop,color,format,pad,alphamerge,null,anull,aformat,setpts,asetpts,fps,trim,atrim,split,asplit,buffer,buffersink,abuffer,abuffersink \
            --enable-protocol=file,pipe \
            --enable-bsf=h264_mp4toannexb,hevc_mp4toannexb,aac_adtstoasc \
            --enable-small \
            --extra-cflags="-I$PREFIX/include -I/mingw64/include -Wno-error=incompatible-pointer-types" \
            --extra-ldflags="-L$PREFIX/lib -L/mingw64/lib" \
            ${{ matrix.ffmpeg_extra }}
          make -j$(nproc)
          make install
          cp /mingw64/lib/libz.a "$PREFIX/lib/"

  build:
    needs: build-ffmpeg
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
            platform: darwin-arm64
            binary: kineto
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            platform: darwin-x64
            binary: kineto
            archive: tar.gz
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary: kineto
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            platform: windows-x64
            binary: kineto.exe
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up MSYS2 (Windows)
        if: matrix.platform == 'windows-x64'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf

      - name: Add MSYS2 MinGW64 to PATH (Windows)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"

      - name: Restore FFmpeg cache
        uses: actions/cache/restore@v4
        with:
          key: ffmpeg-${{ matrix.platform }}-${{ env.FFMPEG_VERSION }}-v${{ env.FFMPEG_CACHE_V }}
          path: ${{ matrix.platform == 'windows-x64' && 'C:/ffmpeg-prefix' || format('{0}/ffmpeg-prefix', runner.temp) }}
          fail-on-cache-miss: true

      - name: Set FFmpeg env vars (POSIX)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: |
          echo "FFMPEG_DIR=${{ runner.temp }}/ffmpeg-prefix" >> "$GITHUB_ENV"
          echo "FFMPEG_DEPS_DIR=${{ runner.temp }}/ffmpeg-prefix" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=${{ runner.temp }}/ffmpeg-prefix/lib/pkgconfig" >> "$GITHUB_ENV"

      - name: Set FFmpeg env vars (Windows)
        if: matrix.platform == 'windows-x64'
        shell: bash
        run: |
          echo "FFMPEG_DIR=C:/ffmpeg-prefix"                                          >> "$GITHUB_ENV"
          echo "FFMPEG_DEPS_DIR=C:/ffmpeg-prefix"                                     >> "$GITHUB_ENV"
          echo "PKG_CONFIG_PATH=C:/ffmpeg-prefix/lib/pkgconfig"                       >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER=C:/msys64/mingw64/bin/x86_64-w64-mingw32-gcc" >> "$GITHUB_ENV"
          echo "PKG_CONFIG_ALLOW_CROSS=1"                                              >> "$GITHUB_ENV"

      - name: Install pkg-config (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config zlib1g-dev

      - name: Build
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Test
        shell: bash
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package (POSIX)
        if: matrix.platform != 'windows-x64'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cd dist && tar -czf ../kineto-${{ matrix.platform }}.tar.gz *

      - name: Package (Windows)
        if: matrix.platform == 'windows-x64'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" dist\
          Compress-Archive -Path dist\* -DestinationPath "kineto-${{ matrix.platform }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: kineto-${{ matrix.platform }}
          path: kineto-${{ matrix.platform }}.${{ matrix.archive }}

  release:
    needs: build
    if: always() && needs.build.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            kineto-darwin-arm64/kineto-darwin-arm64.tar.gz
            kineto-darwin-x64/kineto-darwin-x64.tar.gz
            kineto-linux-x64/kineto-linux-x64.tar.gz
            kineto-windows-x64/kineto-windows-x64.zip
          fail_on_unmatched_files: false
          generate_release_notes: true
